<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QR Code</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
        }
        .container {
            background: #16213e;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
        }
        h1 { color: #e94560; margin-bottom: 1.5rem; font-size: 1.5rem; }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #0f3460;
            border-radius: 0.5rem;
            background: #0f3460;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #e94560; }
        input::placeholder { color: #888; }
        button {
            width: 100%;
            padding: 0.8rem;
            margin-top: 1rem;
            border: none;
            border-radius: 0.5rem;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }
        button:active { transform: translateY(0); }
        #qrcode { margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gerador de QR Code</h1>
        <input type="text" id="address" placeholder="Digite URL ou texto">
        <button onclick="generateQRCode()">Gerar QR Code</button>
        <canvas id="qrcode"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <script>
        function generateQRCode() {
            var valor = document.getElementById('address').value || ' ';
            new QRious({ element: document.getElementById('qrcode'), size: 220, value: valor });
        }
    </script>
</body>
</html>
